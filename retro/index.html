<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    /* Phones don't get the retro desktop (it's a landscape, mouse experience).
       Bounce them to the normal portfolio. Orientation-proof: a phone's
       smaller screen dimension is well under 600 CSS px. */
    (function () {
      if (Math.min(screen.width, screen.height) < 600) {
        var p = location.pathname, i = p.indexOf("/retro");
        if (i >= 0) { location.replace(p.slice(0, i) + "/" + location.hash); }
      }
    })();
    /* When served under /retro (live on Vercel, which strips the trailing slash
       to /retro), pin a <base> so relative css/js/asset paths still resolve.
       At the site root (local dev) this does nothing, so the same file works
       both places and the bundle can be a straight copy of this one. */
    (function () {
      var p = location.pathname, i = p.indexOf("/retro");
      if (i >= 0) { var b = document.createElement("base"); b.href = p.slice(0, i) + "/retro/"; document.head.appendChild(b); }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pranav Kaja: PranavOS 95</title>
  <meta name="description" content="The portfolio of Pranav Kaja, Data & Analytics Engineer, rebuilt as a retro Windows 95 desktop. Boot it up and explore.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="PranavOS 95: Pranav Kaja's portfolio as a Windows 95 desktop">
  <meta property="og:description" content="Boot up PranavOS 95 and explore Pranav Kaja's data &amp; analytics work as a retro Windows 95 desktop.">
  <meta property="og:url" content="https://pranavkaja.com/retro">
  <meta property="og:image" content="https://pranavkaja.com/images/og-card.png?v=2">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PranavOS 95: Pranav Kaja">
  <meta name="twitter:description" content="Pranav Kaja's portfolio, rebuilt as a retro Windows 95 desktop.">
  <meta name="twitter:image" content="https://pranavkaja.com/images/og-card.png?v=2">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/win95.css">
</head>
<body>

  <!-- ===== BOOT (BIOS POST) ===== -->
  <div id="boot"><div class="bios"></div></div>

  <!-- ===== WIN95 SPLASH ===== -->
  <div id="splash">
    <div class="logo">PranavOS<span>DATA &amp; ANALYTICS EDITION</span></div>
    <div class="loadbar"><i></i></div>
  </div>

  <!-- ===== DESKTOP ===== -->
  <div id="desktop" class="hidden"></div>

  <!-- ===== START MENU ===== -->
  <div id="start-menu"></div>

  <!-- ===== TASKBAR ===== -->
  <div id="taskbar" class="hidden">
    <button id="start-btn"><span class="flag">🪟</span> Start</button>
    <span class="tb-divider"></span>
    <div id="task-buttons"></div>
    <div id="tray">
      <span class="tray-ico" id="mute-btn" title="Mute / unmute" style="cursor:pointer">🔊</span>
      <span class="tray-ico" title="Network">📡</span>
      <span id="clock">12:00 PM</span>
    </div>
  </div>

  <!-- ===== SHUTDOWN ===== -->
  <div id="shutdown" class="hidden">
    <div class="sd-inner">
      <div class="sd-msg">It's now safe to turn off<br>your computer.</div>
      <button id="reboot-btn" class="btn95" style="margin-top:24px">Restart PranavOS</button>
    </div>
  </div>

  <!-- ===== CRT SCANLINES ===== -->
  <div id="scanlines"></div>

  <!-- scripts -->
  <script src="js/data.js"></script>
  <script src="js/wm.js"></script>
  <script src="js/apps.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/assistant.js"></script>
</body>
</html>
