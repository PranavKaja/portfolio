<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact // PRANAV KAJA</title>
    <meta name="description" content="Get in touch with Pranav Kaja, Data & Analytics Engineer. Email, LinkedIn, or the contact form.">
    <meta property="og:title" content="Contact | Pranav Kaja">
    <meta property="og:description" content="Get in touch with Pranav Kaja, Data & Analytics Engineer. Email, LinkedIn, and GitHub for data, analytics, and BI roles, or anything worth building.">
    <meta property="og:image" content="https://pranavkaja.com/images/og-card.png?v=2">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact | Pranav Kaja">
    <meta name="twitter:description" content="Get in touch with Pranav Kaja, Data & Analytics Engineer. Email, LinkedIn, and GitHub for data, analytics, and BI roles, or anything worth building.">
    <meta name="twitter:image" content="https://pranavkaja.com/images/og-card.png?v=2">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://pranavkaja.com/contact">
    <meta property="og:url" content="https://pranavkaja.com/contact">
    <meta name="author" content="Pranav Kaja">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "url": "https://pranavkaja.com/contact",
      "name": "Contact | Pranav Kaja",
      "isPartOf": { "@type": "WebSite", "url": "https://pranavkaja.com/", "name": "Pranav Kaja | Portfolio" },
      "about": {
        "@type": "Person",
        "name": "Pranav Kaja",
        "jobTitle": "Data & Analytics Engineer",
        "url": "https://pranavkaja.com/",
        "sameAs": ["https://www.linkedin.com/in/pranavkaja", "https://github.com/PranavKaja"]
      }
    }
    </script>
    <style>
        .contact-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .contact-card {
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 12px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
        }

        .contact-card:hover {
            box-shadow: 0 8px 24px rgba(255, 69, 0, 0.15);
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .contact-card:hover .card-icon {
            color: var(--accent);
            transform: scale(1.1);
        }

        .card-icon {
            margin-bottom: 20px;
            color: #1a1a1a;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #5f6368;
            text-align: center;
        }

        .contact-hero {
            padding: 150px 20px 60px;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .tagline {
            font-size: 1.2rem;
            color: #5f6368;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 15px;
            margin-top: 5px;
            font-style: italic;
            display: inline-block;
            max-width: 600px;
        }

        @media (max-width: 768px) {
            .contact-hero {
                padding-top: 120px;
                padding-bottom: 30px;
            }

            .contact-title {
                font-size: 2.6rem;
                margin-bottom: 10px;
            }

            .tagline {
                font-size: 1rem;
                padding-bottom: 10px;
                margin-bottom: 10px;
            }

            .contact-grid {
                margin-top: 20px;
                gap: 15px;
                width: 100%;
            }

            .contact-card {
                padding: 20px 15px;
            }

            .card-icon {
                margin-bottom: 10px;
            }

            .card-title {
                font-size: 1.1rem;
                margin-bottom: 5px;
            }

            .card-desc {
                font-size: 0.85rem;
            }
        }

        /* Transmission Log, contact form */
        .transmit-panel {
            width: 100%;
            max-width: 700px;
            margin: 55px auto 0;
            text-align: left;
            border: 2px solid var(--text-main);
            background: #ffffff;
            padding: 32px;
        }
        .transmit-head {
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        .tx-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
        .tx-field { display: block; margin-bottom: 16px; }
        .tx-field > span {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .tx-field input, .tx-field textarea {
            width: 100%;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            border: 1px solid var(--text-main);
            padding: 10px 12px;
            background: #fff;
            color: var(--text-main);
        }
        .tx-field textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
        .tx-field input:focus, .tx-field textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
        .tx-hp { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }
        .tx-actions { display: flex; align-items: center; gap: 18px; margin-top: 6px; }
        .tx-msg { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; }
        .tx-msg.ok { color: #2b8a3e; }
        .tx-msg.err { color: #c0392b; }
        .transmit-form.sent .tx-field,
        .transmit-form.sent #tx-submit { opacity: .5; pointer-events: none; }
        @media (max-width: 560px) {
            .tx-row { grid-template-columns: 1fr; }
            .transmit-panel { padding: 22px; }
        }
    </style>
</head>

<body class="flex-col min-h-screen">
    <a class="skip-link" href="#main">Skip to content</a>
    <nav class="top-nav">
        <a href="/" class="nav-logo interactive-element no-underline text-inherit">SUBJECT
            // PRANAV KAJA</a>

        <div class="nav-links">
        </div>
    </nav>

    <main class="content flex-1" id="main">
        <section class="contact-hero">
            <h1 class="contact-title">Get in touch</h1>
            <p class="tagline">"Email me. 100% chance I read it."</p>

            <div class="contact-grid">
                <a href="#" class="contact-card" id="email-card">
                    <div class="card-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <h3 class="card-title">Email</h3>
                    <p class="card-desc" id="email-desc"></p>
                </a>

                <a href="https://linkedin.com/in/pranavkaja" class="contact-card" target="_blank" rel="noopener">
                    <div class="card-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z">
                            </path>
                            <rect x="2" y="9" width="4" height="12"></rect>
                            <circle cx="4" cy="4" r="2"></circle>
                        </svg>
                    </div>
                    <h3 class="card-title">LinkedIn</h3>
                    <p class="card-desc">/in/pranavkaja</p>
                </a>

                <a href="https://github.com/PranavKaja" class="contact-card" target="_blank" rel="noopener">
                    <div class="card-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                            </path>
                        </svg>
                    </div>
                    <h3 class="card-title">GitHub</h3>
                    <p class="card-desc">github.com/PranavKaja</p>
                </a>
            </div>

            <div class="transmit-panel">
                <div class="transmit-head">// Open transmission channel</div>
                <form id="transmit-form" class="transmit-form" novalidate>
                    <div class="tx-row">
                        <label class="tx-field"><span>Callsign / Name</span>
                            <input type="text" id="tx-name" maxlength="200" autocomplete="name" placeholder="e.g. emelon musk" required></label>
                        <label class="tx-field"><span>Return Email</span>
                            <input type="email" id="tx-email" maxlength="320" autocomplete="email" placeholder="emusk@spacey.com" required></label>
                    </div>
                    <label class="tx-field"><span>Phone (optional)</span>
                        <input type="tel" id="tx-phone" maxlength="50" autocomplete="tel" placeholder="your phone number here"></label>
                    <label class="tx-field"><span>Transmission</span>
                        <textarea id="tx-body" maxlength="5000" placeholder="Your message here..." required></textarea></label>
                    <!-- honeypot: invisible to humans; bots fill it and get silently dropped -->
                    <input type="text" id="tx-website" class="tx-hp" tabindex="-1" autocomplete="off" aria-hidden="true">
                    <div class="tx-actions">
                        <button type="submit" class="btn btn-primary" id="tx-submit">Transmit</button>
                        <span class="tx-msg" id="tx-msg" role="status" aria-live="polite"></span>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        &copy; <span id="year"></span> Pranav Kaja. All rights reserved.
    </footer>

    <!-- Global Custom Cursor nodes placed at end of DOM to guarantee top stacking context -->
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="config.js" defer></script>
    <script src="analytics.js" defer></script>
    <script src="main.js" defer></script>
    <script src="contact.js" defer></script>
    <script>
        // Self-updating copyright year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Contact details are assembled at runtime so bots scraping the
        // raw HTML for mailto:/tel: patterns and digit runs find nothing.
        // Humans (and their screen readers) see the exact same cards.
        (function () {
            const addr = ['balaji', 'pranav', 'reddyk'].join('') + '@' + 'gmail.com';
            const emailCard = document.getElementById('email-card');
            emailCard.href = 'mailto:' + addr;
            document.getElementById('email-desc').textContent = addr;
        })();
    </script>
</body>

</html>
