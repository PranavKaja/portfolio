<style>
/* ============================================================
   CPK Production Sheets: standalone kitchen tool.
   Paper-first design: the screen is the sheet you print.
   The production date wears its day-dot color (kitchen labels).
   ============================================================ */
:root{
  --paper:#FBFAF7; --card:#FFFFFF; --ink:#1C1D1F; --muted:#6E6C66;
  --rule:#D7D5CF; --rule-soft:#E8E6E0; --band:#F1EFE9;
  --accent:#4B5563; /* replaced per production weekday */
  --warn:#B45309; --warn-bg:#FEF3E2; --ok:#15803D;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font:15px/1.5 Inter,system-ui,sans-serif}
button{font:inherit;cursor:pointer;color:inherit;background:none;border:none}
input,select,textarea{font:inherit;color:inherit}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

.wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px}

/* ---- toolbar ---- */
.bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:16px 0 12px;border-bottom:2px solid var(--ink)}
.brand{font-family:Oswald,sans-serif;font-weight:600;font-size:1.25rem;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.brand small{display:block;font-family:Inter,sans-serif;font-weight:500;font-size:.68rem;letter-spacing:.14em;color:var(--muted)}
.daychip{display:inline-flex;align-items:center;gap:9px;border:1.5px solid var(--ink);border-radius:999px;padding:7px 16px 7px 10px;background:var(--card);font-family:Oswald,sans-serif;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.daychip .dot{width:18px;height:18px;border-radius:50%;background:var(--accent);flex:none}
.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--ink);border-radius:8px;padding:9px 16px;font-weight:600;font-size:.85rem;letter-spacing:.04em;background:var(--card)}
.btn:hover{background:var(--band)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.08)}
.btn svg{width:17px;height:17px;flex:none}
.btn.iconbig{padding:9px 14px;font-size:.9rem}

/* ---- input card ---- */
.inputcard{background:var(--card);border:1.5px solid var(--rule);border-radius:12px;margin:18px 0;padding:18px}
.inputcard h2{font-family:Oswald,sans-serif;font-weight:600;font-size:1.02rem;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.inputcard p.sub{color:var(--muted);font-size:.85rem;margin-bottom:12px}
textarea#orders{width:100%;min-height:170px;border:1.5px solid var(--rule);border-radius:8px;background:var(--paper);padding:12px;font:12px/1.5 var(--mono);resize:vertical;white-space:pre;overflow:auto}
textarea#orders.drag{border-color:var(--accent);background:#fff}
.inputrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
.quiet{background:none;border:none;color:var(--muted);font-size:.82rem;text-decoration:underline;text-underline-offset:3px;padding:6px 4px}
.quiet:hover{color:var(--ink)}
.statusline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 2px 0;font-size:.85rem;color:var(--muted)}
.statusline .tag{font-size:.68rem;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:4px;background:var(--band);color:var(--ink)}
.statusline .tag.warn{background:var(--warn-bg);color:var(--warn)}
.collapsed-input{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);border:1.5px solid var(--rule);border-radius:12px;margin:18px 0;padding:12px 18px;font-size:.88rem}

/* ---- tabs ---- */
.tabs{display:flex;gap:2px;overflow-x:auto;border-bottom:1.5px solid var(--rule);margin:6px 0 0;scrollbar-width:thin}
.tab{font-family:Oswald,sans-serif;font-weight:500;font-size:.92rem;letter-spacing:.08em;text-transform:uppercase;padding:11px 16px 9px;border-bottom:3px solid transparent;color:var(--muted);white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;min-width:10px;height:10px;border-radius:50%;margin-left:6px;vertical-align:2px}
.tab .badge.ok{background:var(--ok)} .tab .badge.warn{background:var(--warn)}

/* ---- sheet ---- */
.sheet{padding:22px 2px}
.sheet-head{display:flex;justify-content:space-between;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.sheet-title{font-family:Oswald,sans-serif;font-weight:600;font-size:1.5rem;letter-spacing:.09em;text-transform:uppercase}
.sheet-date{font-family:Oswald,sans-serif;font-size:.95rem;letter-spacing:.07em;color:var(--muted);text-transform:uppercase}
.grid2{display:grid;grid-template-columns:3fr 2fr;gap:22px;align-items:start}
@media(max-width:840px){.grid2{grid-template-columns:1fr}}
.blocklabel{font-family:Oswald,sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:2px 0 7px}
.mt{margin-top:20px}

table.t{width:100%;border-collapse:collapse;background:var(--card);border:1.5px solid var(--rule);border-radius:10px;overflow:hidden;font-variant-numeric:tabular-nums}
.t th,.t td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--rule-soft);vertical-align:top}
.t thead th{font-size:.7rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);background:var(--band);border-bottom:1.5px solid var(--rule)}
.t .num{text-align:right}
.t .mono{font-family:var(--mono);font-size:.82rem;color:var(--muted)}
.t .big{font-size:1.12rem;font-weight:700}
.t tr.band td{background:var(--band);font-family:Oswald,sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;padding:6px 12px}
.t tr.total td{border-top:2px solid var(--ink);font-weight:700;background:var(--card)}
.t tr:last-child td{border-bottom:none}
.t td.zero{color:#B9B7B0}
.hint{font-size:.78rem;color:var(--muted);margin-top:8px}
.scroll{overflow-x:auto;border-radius:10px}
.scroll table.t{min-width:900px}
.sheet-headr{display:flex;align-items:center;gap:14px;flex-wrap:wrap}

/* ---- packout grid ---- */
.pk tr.pkband th{font-family:Oswald,sans-serif;font-size:.7rem;letter-spacing:.1em;text-align:left;color:var(--ink)}
.pk th.vlab{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;vertical-align:bottom;text-align:left;padding:10px 3px 8px;font-size:.76rem;font-weight:600;letter-spacing:.02em;text-transform:none;color:var(--ink);height:116px}
.pk th.vlab .inum{font-family:var(--mono);font-size:.62rem;color:var(--muted);font-weight:400}
.pk .gstart{border-left:2px solid var(--rule)}
.pk td.loc,.pk th.loc{position:sticky;left:0;background:var(--card);white-space:nowrap;z-index:1;font-weight:600}
.pk thead th.loc{background:var(--band);vertical-align:bottom}
.pk tbody tr:nth-child(even) td{background:#F5F3EE}
.pk td.q{font-weight:700;font-size:1.02rem}
.pk .tray{border-left:2px solid var(--ink);background:var(--band);font-weight:700}
.pk td.tray{font-size:1.1rem}
.pk tr.pkempty td{opacity:.4}
.pk tr.total td{background:var(--band)}
.pk tr.total td.loc{background:var(--band)}
.pk td.col-hl,.pk th.col-hl{background:#EAF1FA!important}
.pk tr.row-hl td{background:#EAF1FA!important}
.pk tbody td.cell-hl,.pk th.cell-hl{background:#D5E3F7!important}
.pk td[data-c],.pk th.vlab,.pk th.tray{cursor:default}
.warnbox{background:var(--warn-bg);border:1.5px solid var(--warn);border-radius:10px;padding:10px 14px;color:var(--warn);font-weight:600;font-size:.88rem;margin-bottom:14px}
.okbox{background:#EDF7EF;border:1.5px solid var(--ok);border-radius:10px;padding:10px 14px;color:var(--ok);font-weight:600;font-size:.88rem;margin-bottom:14px}
tr.flag td{background:var(--warn-bg)}

@media(max-width:640px){
  .wrap{padding:0 12px 40px}
  .t th,.t td{padding:6px 8px}
  #out{overflow-x:auto}
  .sheet{padding:16px 0}
  .btn.iconbig{padding:8px 12px;font-size:.8rem}
}

/* ---- footer / settings entry ---- */
footer{margin-top:36px;padding-top:14px;border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:.78rem}
#gear{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.78rem}
#gear:hover{color:var(--ink)}

/* ---- settings ---- */
.set-nav{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1.5px solid var(--rule);margin-bottom:18px}
.set-nav .tab{font-size:.85rem}
.card{background:var(--card);border:1.5px solid var(--rule);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.card h3{font-family:Oswald,sans-serif;font-weight:600;font-size:1rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.card p.help{color:var(--muted);font-size:.84rem;margin-bottom:10px;max-width:70ch}
.formgrid{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin:8px 0}
.field{display:flex;flex-direction:column;gap:4px;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.field input,.field select{border:1.5px solid var(--rule);border-radius:7px;padding:8px 10px;background:var(--paper);font-size:.88rem;color:var(--ink);text-transform:none;letter-spacing:0;font-weight:400}
.field input:focus,.field select:focus{border-color:var(--accent)}
.mini{border:1.5px solid var(--rule);border-radius:7px;padding:5px 11px;font-size:.78rem;font-weight:600;background:var(--card)}
.mini:hover{border-color:var(--ink)}
.mini.danger{color:#B91C1C;border-color:#E5B3B3}
.mini.danger:hover{border-color:#B91C1C}
.term{display:inline-flex;align-items:center;gap:7px;background:var(--band);border:1px solid var(--rule);border-radius:999px;padding:4px 6px 4px 12px;font-size:.82rem;margin:3px 4px 3px 0;font-variant-numeric:tabular-nums}
.term button{font-weight:700;color:var(--muted);padding:0 6px}
.term button:hover{color:#B91C1C}
.rowoff{opacity:.45}
.msg{font-size:.84rem;color:var(--warn);font-weight:600;margin-top:6px;min-height:1.2em}
.msg.good{color:var(--ok)}
.loginbox{max-width:420px;margin:60px auto;text-align:center}
.loginbox .card{padding:26px}
.loginbox input{width:100%;margin-bottom:10px;border:1.5px solid var(--rule);border-radius:8px;padding:11px 12px;background:var(--paper)}

/* ---- print ---- */
#printbox{display:none}
@page{margin:10mm}
@page cpkland{size:letter landscape;margin:8mm}
@media print{
  body>*:not(#printbox){display:none!important}
  #printbox{display:block;color:#000;background:#fff;font-size:12px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #printbox .sheetprint,#printbox .noprint{display:none!important}
  #printbox .psheet{page-break-after:always}
  #printbox .psheet:last-child{page-break-after:auto}
  #printbox .p-packout{page:cpkland}
  #printbox .scroll{overflow:visible!important}
  #printbox .scroll table.t{min-width:0}
  #printbox table.t{width:100%;border:none;border-radius:0;font-size:11px}
  #printbox .p-packout table.t{font-size:9.5px}
  #printbox .pk th.vlab{height:auto;font-size:8.5px;padding:5px 2px 4px}
  #printbox .pk th.vlab .inum{font-size:7px;color:#444}
  #printbox .pk tr.pkband th{font-size:8px;background:#eee}
  #printbox .pk td.loc,#printbox .pk th.loc{position:static;font-weight:700}
  #printbox .pk .gstart{border-left:1.5px solid #000!important}
  #printbox .pk .tray{border-left:1.5px solid #000!important;background:#eee;font-weight:700}
  #printbox .pk tbody tr:nth-child(even) td{background:#f2f2f2}
  #printbox .pk tr.pkempty td{color:#999}
  #printbox .pk td.q{font-weight:700}
  #printbox .t th,#printbox .t td{border:1px solid #999;padding:3px 5px;color:#000}
  #printbox .t thead th{background:#eee;color:#000}
  #printbox .t tr.band td{background:#eee;color:#000}
  #printbox .t .big{font-size:12px}
  #printbox .t td.zero{color:#bbb}
  #printbox .sheet-head{margin-bottom:6px}
  #printbox .sheet-title{font-size:16px}
  #printbox .sheet-date{font-size:11px;color:#000}
  #printbox .daychip{border-color:#000}
  #printbox .grid2{display:grid;grid-template-columns:3fr 2fr;gap:14px}
  #printbox .hint{color:#444;font-size:9px}
  #printbox .blocklabel{color:#000}
  #printbox .warnbox,#printbox .okbox{border-color:#000;color:#000;background:#fff}
}
</style>
</head>

function loadConfig() {

  } catch (e) {}

/* ============================================================
   PARSER (same grammar as the validated planner)
   ============================================================ */
var LINE = /^\s*(\d{1,2}\/\d{1,2}\/\d{2,4})\s+(\d[\d.]*)\s+(.+?)\s+(\d{1,3})\s*,\s*(.+?)\s{2,}(\d+)\s+(?:(\d+)\s+)?([A-Za-z]+)/;
var DATE_LEAD = /^\s*\d{1,2}\/\d{1,2}\/\d{2,4}/;
function parseRecap(text) {
  var rows = [], skipped = [], multi = false;
  var end = text.search(/^[ \t]*END OF LIST/im);
  if (end !== -1) {
    multi = /\d{1,2}\/\d{1,2}\/\d{2,4}/.test(text.slice(end + 11));
    text = text.slice(0, end);
  }
  text.split(/\r?\n/).forEach(function (line) {
    if (!line.trim()) return;
    var m = line.match(LINE);
    if (!m) { if (DATE_LEAD.test(line)) skipped.push(line.trim()); return; }
    rows.push({
      date: m[1],
      item: normItem(m[2]),
      name: m[3].trim(),
      locCode: m[4].replace(/^0+(?=\d)/, '').padStart(2, '0'),
      loc: m[5].trim(),
      qty: parseInt(m[6], 10) || 0
    });
  });
  return { rows: rows, skipped: skipped, multi: multi, excel: false };
}
/* Fallback for rows copied straight off the Excel workbook's Paste page:
   tab-separated cells carrying an ITEM_LOCATION key like "253_23" with the
   amount in the next filled cell. Works whether or not the date and item
   columns came along in the copy. */
function parseExcelPaste(text) {
  var rows = [], seen = {}, stop = false;
  text.split(/\r?\n/).forEach(function (line) {
    if (stop || line.indexOf('\t') === -1) return;
    if (/END OF LIST/i.test(line)) { stop = true; return; }
    var cells = line.split('\t').map(function (c) { return c.trim(); });
    var ki = -1;
    for (var i = 0; i < cells.length; i++) {
      if (/^\d[\d.]*_\d{1,3}$/.test(cells[i])) { ki = i; break; }
    }
    if (ki === -1) return;
    var qty = null;
    for (var j = ki + 1; j < cells.length; j++) {
      if (cells[j] !== '') { if (/^\d+$/.test(cells[j])) qty = parseInt(cells[j], 10); break; }
    }
    if (qty === null) return;
    var kp = cells[ki].split('_');
    var item = normItem(kp[0]);
    var loc = (kp[1].replace(/^0+(?=\d)/, '') || '0').padStart(2, '0');
    if (seen[item + '_' + loc]) { stop = true; return; } /* stacked older recap below: first one only */
    seen[item + '_' + loc] = 1;
    var name = '';
    for (var n = 0; n < ki; n++) {
      if (/[A-Za-z]/.test(cells[n]) && cells[n].charAt(0) !== ',' && !/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(cells[n]) && !/^\d+\s+[A-Za-z]+$/.test(cells[n])) { name = cells[n]; break; }
    }
    rows.push({ date: '', item: item, name: name || ('Item ' + item), locCode: loc, loc: '', qty: qty });
  });
  return { rows: rows, skipped: [], multi: false, excel: true };
}
function parse(text) {
  /* Tabs (an Excel copy) collapse to one whitespace char, which the recap
     grammar reads as a single space; widen them so both formats parse. */
  var out = parseRecap(text.replace(/\t/g, '   '));
  if (!out.rows.length) {
    var x = parseExcelPaste(text);
    if (x.rows.length) return x;
  }
  return out;
}

/* ============================================================
   ENGINE
   ============================================================ */
function indexOrders(rows) {
  var idx = {};
  rows.forEach(function (r) {
    var e = idx[r.item] || (idx[r.item] = { name: r.name, total: 0, byLoc: {} });
    e.byLoc[r.locCode] = (e.byLoc[r.locCode] || 0) + r.qty;
    e.total += r.qty;
  });
  return idx;
}
function makeCtx(idx) {
  function tot(it) { var e = idx[normItem(it)]; return e ? e.total : 0; }
  function loc(it, l) { var e = idx[normItem(it)]; return e ? (e.byLoc[l] || 0) : 0; }
  return {
    idx: idx,
    tot: tot,
    loc: loc,
    dc: function (it) { return loc(it, '01'); },
    rt: function (it) { return tot(it) - config.dcLocs.reduce(function (s, l) { return s + loc(it, l); }, 0); },
    tsSand: function (it) { return tot(it) * 3; },
    tsPkg: function (it) { return tot(it) * 2; }
  };
}
function srcVal(ctx, item, src) {
  if (src === 'dc') return ctx.dc(item);
  if (src === 'rt') return ctx.rt(item);
  if (src === 'tsSand') return ctx.tsSand(item);
  if (src === 'tsPkg') return ctx.tsPkg(item);
  return ctx.tot(item);
}
function calcVal(ctx, row) {
  var sum = row.terms.reduce(function (s, t) { return s + (Number(t.mult) || 0) * srcVal(ctx, t.item, t.src); }, 0);
  var x = sum / (Number(row.per) || 1);
  if (row.round === 'up') return roundup(x);
  if (row.round === 'up1') return roundup(x, 1);
  if (row.round === 'r1') return r1(x);
  if (row.round === 'r2') return r2(x);
  return x;
}
function itemsOn(sheet) { return config.items.filter(function (i) { return i.on && i.sheet === sheet; }); }
function calcsIn(slot) { return config.calcs.filter(function (c) { return c.slot === slot; }); }
function stickerVal(ctx, item) {
  var s = item.stk;
  if (!s) return 0;
  if (s.src === 'dc') return ctx.dc(item.id);
  if (s.src === 'rt') return ctx.rt(item.id);
  if (s.src === 'pkg') return ctx.tsPkg(item.id);
  return ctx.tot(item.id);
}

/* Production date = the due date on the orders themselves (most common
   one), falling back to tomorrow when nothing is loaded. */
var DAY_DOTS = ['#16161A', '#1D4ED8', '#CA8A04', '#DC2626', '#7C4A03', '#15803D', '#EA580C'];
var DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
function prodDate() {
  var counts = {};
  data.rows.forEach(function (r) { if (r.date) counts[r.date] = (counts[r.date] || 0) + 1; });
  var best = null;
  Object.keys(counts).forEach(function (d) { if (!best || counts[d] > counts[best]) best = d; });
  var dt;
  if (best) {
    var p = best.split('/');
    dt = new Date((p[2].length === 2 ? 2000 + +p[2] : +p[2]), p[0] - 1, +p[1]);
  } else {
    dt = new Date(); dt.setDate(dt.getDate() + 1);
  }
  return { label: (dt.getMonth() + 1) + '/' + dt.getDate() + '/' + dt.getFullYear(), day: dt.getDay(), fromOrders: !!best };
}

function itemTable(sheet, ctx, needFn) {

    var inBody = cell.parentElement && cell.parentElement.parentElement && cell.parentElement.parentElement.tagName === 'TBODY';

/* ============================================================
   CHECK (audit): every ordered unit must land on a sheet.
   ============================================================ */
function auditData(ctx) {
  var dcItems = {}, rtItems = {}, whole = {}, pkItems = {};
  config.items.forEach(function (i) {
    if (!i.on) return;
    if (i.sheet === 'dc') dcItems[i.id] = 1;
    if (i.sheet === 'retail') rtItems[i.id] = 1;
    if (i.sheet === 'triple' || i.sheet === 'fruit') whole[i.id] = 1;
    if (i.pack) pkItems[i.id] = 1;
  });
  config.calcs.forEach(function (c) {
    c.terms.forEach(function (t) { if (t.src === 'tot') whole[t.item] = whole[t.item] || 2; });
  });
  var rows = [], problems = 0, uncoveredTotal = 0;
  Object.keys(ctx.idx).sort(function (a, b) { return +a - +b; }).forEach(function (it) {
    var e = ctx.idx[it];
    if (!e.total) return;
    var dcQty = e.byLoc['01'] || 0;
    var otherDC = config.dcLocs.slice(1).reduce(function (s, l) { return s + (e.byLoc[l] || 0); }, 0);
    var rtQty = e.total - dcQty - otherDC;
    var notes = [], uncovered = 0;
    if (!dcItems[it] && !rtItems[it] && !whole[it]) {
      notes.push('on NO sheet: ' + e.total + ' units not produced');
      uncovered = e.total;
    } else if (!whole[it]) {
      if (dcQty > 0 && !dcItems[it]) { notes.push('DC qty not counted (no DC row)'); uncovered += dcQty; }
      if (rtQty > 0 && !rtItems[it]) { notes.push('cafe qty not counted (no Retail row)'); uncovered += rtQty; }
      if (otherDC > 0) notes.push(otherDC + ' at Franklin/Hampshire/Berkshire excluded (made by that DC, not Worcester)');
    }
    if (rtQty > 0 && !pkItems[it] && (rtItems[it] || whole[it])) notes.push('no Packout column: cafe units will not ship');
    if (uncovered > 0 || notes.some(function (n) { return n.indexOf('Packout') !== -1; })) problems++;
    uncoveredTotal += uncovered;
    rows.push({
      item: it, name: e.name, total: e.total,
      dc: dcItems[it] ? dcQty : null, rt: rtItems[it] ? rtQty : null,
      whole: whole[it] ? e.total : null, otherDC: otherDC,
      pk: !!pkItems[it], notes: notes, uncovered: uncovered
    });
  });
  return { rows: rows, problems: problems, uncovered: uncoveredTotal };
}

  var a = auditData(ctx);

function checkLogin(id, pass) {
  var msg = (String(id).trim() + ':' + String(pass).trim()).toUpperCase();
  if (!(window.crypto && crypto.subtle)) return Promise.resolve(false);
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg)).then(function (buf) {
    var hex = Array.prototype.map.call(new Uint8Array(buf), function (x) { return x.toString(16).padStart(2, '0'); }).join('');

  });
}

    out.innerHTML = '<p class="hint" style="font-size:.95rem;">Paste an Orders Recap above (or load the sample) and the production sheets appear here.</p>';

  }

  Array.prototype.forEach.call(out.querySelectorAll('[data-printsheet]'), function (b) {
    b.addEventListener('click', function () { doPrint([b.dataset.printsheet]); });
  });
  var pe = out.querySelector('#pk-showempty');
  if (pe) pe.addEventListener('change', function () { pkShowEmpty = pe.checked; render(); });
  var pkt = out.querySelector('table.pk');
  if (pkt) bindPackoutHover(pkt);

function titleCase(s) {
  return String(s || '').toLowerCase().replace(/\b\w/g, function (c) { return c.toUpperCase(); });
}

function generate(text, fromSample) {
  lastText = text;
  usingSample = !!fromSample;
  data = parse(text);
  if (data.rows.length) inputOpen = false;
  render();
}

function bindInputEvents() {
  var ta = $('orders');
  $('btn-gen').addEventListener('click', function () { generate(ta.value, false); });
  $('btn-sample').addEventListener('click', function () { generate(SAMPLE, true); });
  $('btn-clear').addEventListener('click', function () { ta.value = ''; data = { rows: [], skipped: [], multi: false }; usingSample = false; lastText = ''; render(); });
  ta.addEventListener('paste', function () { setTimeout(function () { if (ta.value.trim()) generate(ta.value, false); }, 60); });
  var file = $('file');
  file.addEventListener('change', function (e) { loadFile(e.target.files && e.target.files[0]); e.target.value = ''; });
  ta.addEventListener('dragover', function (e) { e.preventDefault(); ta.classList.add('drag'); });
  ta.addEventListener('dragleave', function () { ta.classList.remove('drag'); });
  ta.addEventListener('drop', function (e) {
    if (!e.dataTransfer || !e.dataTransfer.files.length) return;
    e.preventDefault(); ta.classList.remove('drag');
    loadFile(e.dataTransfer.files[0]);
  });
}
function loadFile(f) {
  if (!f) return;
  var reader = new FileReader();
  reader.onload = function () { generate(String(reader.result || ''), false); };
  reader.readAsText(f);
}

}

function bindSettingsEvents() {
  var out = $('out');
  $('set-close').addEventListener('click', function () { view = 'sheets'; editingItem = null; editingCalc = null; pendingAdd = null; render(); });
  Array.prototype.forEach.call(out.querySelectorAll('[data-setnav]'), function (b) {
    b.addEventListener('click', function () { setTab = b.dataset.setnav; editingItem = null; editingCalc = null; render(); });
  });

  /* menu */
  var add = $('mi-add');
  if (add) add.addEventListener('click', function () { editingItem = -1; render(); });
  Array.prototype.forEach.call(out.querySelectorAll('[data-toggle]'), function (cb) {
    cb.addEventListener('change', function () {
      config.items[+cb.dataset.toggle].on = cb.checked;
      saveConfig(); render();
    });
  });
  Array.prototype.forEach.call(out.querySelectorAll('[data-edit]'), function (b) {
    b.addEventListener('click', function () { editingItem = +b.dataset.edit; pendingAdd = null; render(); });
  });
  if ($('if-save')) {
    $('if-save').addEventListener('click', function () {
      var id = normItem(($('if-id').value || '').trim());
      var name = ($('if-name').value || '').trim();
      var sheet = $('if-sheet').value;
      var msg = $('if-msg');
      if (!/^\d{2,6}$/.test(id)) { msg.textContent = 'Item # must be 2 to 6 digits.'; return; }
      if (!name) { msg.textContent = 'Give the item a name.'; return; }
      if (editingItem === -1 && config.items.some(function (i) { return i.id === id && i.sheet === sheet; })) {
        msg.textContent = 'Item ' + id + ' is already on that sheet.'; return;
      }
      var stkList = $('if-stklist').value;
      var stkSrcBySheet = { dc: 'dc', retail: 'rt', triple: 'pkg', fruit: 'tot' };
      var rec = {
        id: id, name: name, recipe: ($('if-recipe').value || '').trim(), sheet: sheet,
        sec: ($('if-sec').value || '').trim().toUpperCase(), on: true,
        pack: $('if-pack').value,
        pkLabel: ($('if-pklabel').value || '').trim() || name.slice(0, 12),
        pkOrd: editingItem === -1 ? 900 : (config.items[editingItem].pkOrd || 900),
        stk: stkList ? { list: stkList, label: (($('if-stklabel').value || '').trim()) || name, src: stkSrcBySheet[sheet] } : null
      };
      if (editingItem === -1) config.items.push(rec);
      else { rec.on = config.items[editingItem].on; config.items[editingItem] = rec; }
      saveConfig();
      editingItem = null; pendingAdd = null;
      render();
    });
    $('if-cancel').addEventListener('click', function () { editingItem = null; pendingAdd = null; render(); });
    var del = $('if-delete');
    if (del) del.addEventListener('click', function () {
      if (window.confirm('Delete this item from the menu? If it is still ordered, the CHECK tab will flag it.')) {
        config.items.splice(editingItem, 1);
        saveConfig(); editingItem = null; render();
      }
    });
  }

  /* wiring */
  Array.prototype.forEach.call(out.querySelectorAll('[data-editcalc]'), function (b) {
    b.addEventListener('click', function () {
      editingCalc = +b.dataset.editcalc;
      draftTerms = JSON.parse(JSON.stringify(config.calcs[editingCalc].terms));
      render(); window.scrollTo(0, 0);
    });
  });
  Array.prototype.forEach.call(out.querySelectorAll('[data-newcalc]'), function (b) {
    b.addEventListener('click', function () {
      editingCalc = 'new:' + b.dataset.newcalc;
      draftTerms = [];
      render(); window.scrollTo(0, 0);
    });
  });
  if ($('cf-save')) {
    var refreshChips = function () {
      $('cf-terms').innerHTML = draftTerms.map(function (t, ti) {
        return '<span class="term">' + esc(String(t.mult)) + ' × ' + esc(t.item) + ' · ' + esc(SRC_LABEL[t.src] || t.src) +
          '<button data-dt="' + ti + '" title="Remove">✕</button></span>';
      }).join('');
      Array.prototype.forEach.call($('cf-terms').querySelectorAll('[data-dt]'), function (x) {
        x.addEventListener('click', function () { draftTerms.splice(+x.dataset.dt, 1); refreshChips(); });
      });
    };
    refreshChips();
    $('cf-addterm').addEventListener('click', function () {
      var item = normItem(($('cf-t-item').value || '').trim());
      var mult = parseFloat($('cf-t-mult').value);
      if (!/^\d{2,6}$/.test(item)) { $('cf-msg').textContent = 'Item # must be 2 to 6 digits.'; return; }
      if (!(mult > 0)) { $('cf-msg').textContent = 'Factor must be a number above 0.'; return; }
      draftTerms.push({ item: item, src: $('cf-t-src').value, mult: mult });
      $('cf-msg').textContent = '';
      $('cf-t-item').value = '';
      refreshChips();
    });
    $('cf-save').addEventListener('click', function () {
      var label = ($('cf-label').value || '').trim();
      var per = parseFloat($('cf-per').value) || 1;
      if (!label) { $('cf-msg').textContent = 'Give the line a name.'; return; }
      if (!draftTerms.length) { $('cf-msg').textContent = 'Add at least one item to the line.'; return; }
      var isNew = typeof editingCalc === 'string';
      var row = {
        slot: isNew ? editingCalc.split(':')[1] : config.calcs[editingCalc].slot,
        sec: $('cf-sec') ? ($('cf-sec').value || '').trim().toUpperCase() : (isNew ? '' : config.calcs[editingCalc].sec || ''),
        label: label,
        unit: ($('cf-unit').value || '').trim(),
        round: $('cf-round').value,
        per: per,
        note: ($('cf-note').value || '').trim(),
        terms: draftTerms
      };
      if (isNew) config.calcs.push(row); else config.calcs[editingCalc] = row;
      saveConfig(); editingCalc = null; draftTerms = null; render();
    });
    $('cf-cancel').addEventListener('click', function () { editingCalc = null; draftTerms = null; render(); });
    var cdel = $('cf-delete');
    if (cdel) cdel.addEventListener('click', function () {
      if (window.confirm('Delete this line? The sheet loses it immediately.')) {
        config.calcs.splice(editingCalc, 1);
        saveConfig(); editingCalc = null; draftTerms = null; render();
      }
    });
  }

  /* setup */
  var trays = $('su-trays');
  if (trays) trays.addEventListener('click', function () {
    var ok = true;
    Array.prototype.forEach.call(out.querySelectorAll('[data-tray]'), function (inp) {
      var v = parseInt(inp.value, 10);
      if (v > 0) config.trays[inp.dataset.tray] = v; else ok = false;
    });
    saveConfig();
    $('su-traymsg').textContent = ok ? 'Saved.' : 'Tray sizes must be whole numbers above 0; bad ones were skipped.';
    $('su-traymsg').className = ok ? 'msg good' : 'msg';
  });
  var route = $('su-routesave');
  if (route) route.addEventListener('click', function () {
    var codes = ($('su-route').value || '').split(',').map(function (s) { return s.trim(); }).filter(function (s) { return /^\d{1,3}$/.test(s); })
      .map(function (s) { return s.replace(/^0+(?=\d)/, '').padStart(2, '0'); });
    if (!codes.length) { $('su-routemsg').textContent = 'No valid codes found.'; return; }
    config.route = codes;
    saveConfig();
    $('su-routemsg').textContent = 'Saved: ' + codes.length + ' stops.';
    $('su-routemsg').className = 'msg good';
  });
  var locsave = $('su-locsave');
  if (locsave) locsave.addEventListener('click', function () {
    Array.prototype.forEach.call(out.querySelectorAll('[data-locname]'), function (inp) {
      var v = inp.value.trim();
      if (v) config.locations[inp.dataset.locname] = v;
    });
    var nc = ($('su-newcode').value || '').trim(), nn = ($('su-newname').value || '').trim();
    if (nc && nn && /^\d{1,3}$/.test(nc)) config.locations[nc.replace(/^0+(?=\d)/, '').padStart(2, '0')] = nn;
    saveConfig();
    $('su-locmsg').textContent = 'Saved.';
    $('su-locmsg').className = 'msg good';
    render();
  });

  /* backup */
  var exp = $('bk-export');
  if (exp) exp.addEventListener('click', function () {
    var blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'cpk-menu-settings.json';
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
  });
  var imp = $('bk-import');
  if (imp) imp.addEventListener('change', function (e) {
    var f = e.target.files && e.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var c = JSON.parse(String(reader.result));
        if (!(c && c.v === 1 && Array.isArray(c.items) && Array.isArray(c.calcs))) throw new Error('shape');
        config = c;
        saveConfig();
        $('bk-msg').textContent = 'Imported: ' + c.items.length + ' items, ' + c.calcs.length + ' linked lines.';
        $('bk-msg').className = 'msg good';
        render();
      } catch (err) {
        $('bk-msg').textContent = 'That file is not a CPK settings file.';
        $('bk-msg').className = 'msg';
      }
    };
    reader.readAsText(f);
    e.target.value = '';
  });
  var rst = $('bk-reset');
  if (rst) rst.addEventListener('click', function () {
    if (window.confirm('Reset the whole menu to the factory version? Every change made on this computer is cleared.')) {
      resetConfig(); render();
    }
  });
  var lock = $('bk-lock');
  if (lock) lock.addEventListener('click', function () { setUnlocked(false); view = 'sheets'; render(); });
}

/* ---- boot ---- */
render();
})();
</script>
</body>
</html>
