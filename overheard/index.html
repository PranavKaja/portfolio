<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Overheard — Kitchen Social Response Index</title>
<style>
  :root{
    --paper:#faf8f5; --ink:#191a1d; --ink-soft:#5b5a57; --line:#e6e2da;
    --card:#ffffff; --missed:#dd4b25; --answered:#188a7b; --amber:#c98a1a;
    --chip:#efece6; --accent:#3b3f8f;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --sans:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --paper:#141416; --ink:#f2efe9; --ink-soft:#a2a09a; --line:#2b2b2f;
    --card:#1c1d20; --chip:#26262a; --missed:#f4693f; --answered:#2fb7a3; --amber:#e0a637;
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  header{border-bottom:1px solid var(--line);padding:34px 0 22px}
  .brandmark{font-weight:800;letter-spacing:-.03em;font-size:30px}
  .brandmark .dot{color:var(--missed)}
  .tagline{font-size:19px;margin:6px 0 0;max-width:46ch}
  .context{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-top:12px;
    display:flex;gap:14px;flex-wrap:wrap}
  .context b{color:var(--ink);font-weight:600}
  /* stat strip */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:22px 0}
  .stat{background:var(--card);padding:16px 18px}
  .stat .n{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-.02em}
  .stat .n.warn{color:var(--missed)}
  .stat .l{font-size:12px;color:var(--ink-soft);margin-top:3px}
  /* filter */
  .filter{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 14px;align-items:center}
  .filter .lab{font-size:12px;color:var(--ink-soft);margin-right:2px}
  .seg{font:inherit;font-size:13px;border:1px solid var(--line);background:var(--card);
    color:var(--ink-soft);padding:6px 12px;border-radius:999px;cursor:pointer}
  .seg[aria-pressed=true]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  /* layout */
  .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:24px;padding-bottom:60px}
  @media (max-width:860px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
  h2.sect{font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-soft);
    margin:0 0 10px;font-weight:600}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--ink-soft);font-weight:600;padding:8px 8px;border-bottom:1px solid var(--line);
    cursor:pointer;white-space:nowrap;user-select:none}
  th.num,td.num{text-align:right;font-family:var(--mono)}
  td{padding:11px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr.brow{cursor:pointer}
  tr.brow:hover td{background:color-mix(in srgb,var(--ink) 5%,transparent)}
  tr.brow[aria-selected=true] td{background:color-mix(in srgb,var(--accent) 12%,transparent)}
  .bname{font-weight:600}
  .cat{font-size:11px;color:var(--ink-soft)}
  .missed-n{font-family:var(--mono);font-weight:700;color:var(--missed);font-size:15px}
  /* silence bar */
  .bar{height:8px;border-radius:6px;background:var(--chip);overflow:hidden;display:flex;min-width:70px}
  .bar .a{background:var(--answered)}.bar .m{background:var(--missed)}
  .rpct{font-family:var(--mono);font-size:12px}
  /* feed */
  .feedhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .feedcount{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
  .ftypes{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 14px}
  .ftype{font-size:11px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    padding:4px 9px;border-radius:999px;cursor:pointer}
  .ftype[aria-pressed=true]{background:var(--chip);color:var(--ink);border-color:var(--ink-soft)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;
    margin-bottom:10px;position:relative}
  .card .top{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
  .badge{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 7px;border-radius:5px}
  .b-question{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
  .b-complaint{background:color-mix(in srgb,var(--missed) 16%,transparent);color:var(--missed)}
  .b-purchase_intent{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--amber)}
  .topic{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
  .urg{width:7px;height:7px;border-radius:50%;display:inline-block}
  .urg.high{background:var(--missed)}.urg.medium{background:var(--amber)}.urg.low{background:var(--ink-soft)}
  .ctext{font-size:14px;margin:2px 0 9px}
  .meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);display:flex;gap:12px;
    align-items:center;flex-wrap:wrap}
  .meta a{color:var(--ink-soft)}
  .stamp{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:9.5px;
    font-weight:700;letter-spacing:.08em;color:var(--missed);border:1.5px solid var(--missed);
    padding:2px 5px;border-radius:4px;transform:rotate(4deg);opacity:.72}
  .empty{color:var(--ink-soft);font-size:14px;padding:26px 4px}
  footer{border-top:1px solid var(--line);padding:16px 0 40px;font-family:var(--mono);
    font-size:11px;color:var(--ink-soft)}
  @media (prefers-reduced-motion:no-preference){.bar .a,.bar .m{transition:width .5s ease}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brandmark">Overheard<span class="dot">.</span></div>
    <p class="tagline">The questions kitchen brands don't answer.</p>
    <div class="context" id="context"></div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="filter" id="filter"><span class="lab">Category</span></div>

  <div class="grid">
    <section>
      <h2 class="sect">The index — who answers, who ignores</h2>
      <table id="league"><thead></thead><tbody></tbody></table>
    </section>
    <section>
      <div class="feedhead">
        <h2 class="sect" id="feedtitle">Missed conversations</h2>
        <span class="feedcount" id="feedcount"></span>
      </div>
      <div class="ftypes" id="ftypes"></div>
      <div id="feed"><div class="empty">Pick a brand to see what it's ignoring.</div></div>
    </section>
  </div>

  <footer id="foot"></footer>
</div>

<script src="data.js"></script>
<script>
const D = window.DATA || {scorecard:[],feed:[],generated:""};
const $ = s => document.querySelector(s);
const fmt = n => n==null?"—":(typeof n==="number"?n.toLocaleString():n);
let catFilter="all", selBrand=null, typeFilter="all";

const cats = [...new Set(D.scorecard.map(r=>r.category))].sort();
const withData = D.scorecard.filter(r=>r.total_mentions>0);

// ---- stat strip ----
function stats(){
  const rows = withData;
  const act = rows.reduce((s,r)=>s+ (r.actionable||0),0);
  const miss = rows.reduce((s,r)=>s+ (r.unanswered||0),0);
  const pct = act? Math.round(miss/act*100):0;
  const worst = rows.slice().sort((a,b)=> (a.response_rate_pct??999)-(b.response_rate_pct??999))[0];
  $("#stats").innerHTML = [
    [`${rows.length}`,"brands with YouTube volume"],
    [`${fmt(act)}`,"questions & complaints found"],
    [`${pct}%`,"left unanswered", true],
    [worst? worst.name:"—","lowest response rate"],
  ].map(([n,l,w])=>`<div class="stat"><div class="n ${w?'warn':''}">${n}</div><div class="l">${l}</div></div>`).join("");
}

// ---- category filter ----
function filterBar(){
  const el=$("#filter");
  const mk=(id,label)=>`<button class="seg" data-cat="${id}" aria-pressed="${catFilter===id}">${label}</button>`;
  el.querySelectorAll(".seg").forEach(b=>b.remove());
  el.insertAdjacentHTML("beforeend", mk("all","All")+cats.map(c=>mk(c,c.replace(/-/g," "))).join(""));
  el.querySelectorAll(".seg").forEach(b=>b.onclick=()=>{catFilter=b.dataset.cat;selBrand=null;render();});
}

// ---- league table ----
let sortKey="unanswered", sortDir=-1;
const cols=[
  ["name","Brand",false],["silence","Answered / missed",false],
  ["unanswered","Missed",true],["response_rate_pct","Resp %",true],
  ["median_reply_hours","Median h",true],["share_of_voice_pct","SoV %",true],
];
function league(){
  let rows=withData.filter(r=>catFilter==="all"||r.category===catFilter);
  rows.sort((a,b)=>{
    if(sortKey==="silence") return ((b.unanswered||0)-(a.unanswered||0));
    let x=a[sortKey]??-1,y=b[sortKey]??-1; return (x<y?-1:x>y?1:0)*sortDir;
  });
  $("#league thead").innerHTML="<tr>"+cols.map(([k,l,num])=>
    `<th class="${num?'num':''}" data-k="${k}">${l}${sortKey===k?(sortDir<0?" ↓":" ↑"):""}</th>`).join("")+"</tr>";
  $("#league tbody").innerHTML=rows.map(r=>{
    const act=r.actionable||0, ans=r.answered||0, mis=r.unanswered||0;
    const aw=act?ans/act*100:0, mw=act?mis/act*100:0;
    const rp=r.response_rate_pct, rc= rp==null?"var(--ink-soft)": rp<25?"var(--missed)":rp<70?"var(--amber)":"var(--answered)";
    return `<tr class="brow" data-b="${r.brand_id}" aria-selected="${selBrand===r.brand_id}">
      <td><div class="bname">${r.name}</div><div class="cat">${r.category.replace(/-/g,' ')}</div></td>
      <td><div class="bar" title="${ans} answered / ${mis} missed"><span class="a" style="width:${aw}%"></span><span class="m" style="width:${mw}%"></span></div></td>
      <td class="num"><span class="missed-n">${mis}</span></td>
      <td class="num"><span class="rpct" style="color:${rc}">${rp==null?"—":rp+"%"}</span></td>
      <td class="num">${r.median_reply_hours==null?"—":r.median_reply_hours}</td>
      <td class="num">${r.share_of_voice_pct==null?"—":r.share_of_voice_pct}</td></tr>`;
  }).join("");
  $("#league thead").querySelectorAll("th").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(k==="silence")return;
    if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==="name")?1:-1;} league();
  });
  $("#league tbody").querySelectorAll(".brow").forEach(tr=>tr.onclick=()=>{selBrand=tr.dataset.b;typeFilter="all";render();});
}

// ---- feed ----
function feed(){
  const ftypes=$("#ftypes"), feedEl=$("#feed");
  if(!selBrand){ftypes.innerHTML="";$("#feedtitle").textContent="Missed conversations";$("#feedcount").textContent="";
    feedEl.innerHTML='<div class="empty">Pick a brand to see what it\'s ignoring.</div>';return;}
  const brand=D.scorecard.find(r=>r.brand_id===selBrand);
  let items=D.feed.filter(f=>f.brand_id===selBrand).sort((a,b)=>(b.like_count||0)-(a.like_count||0));
  const types=[...new Set(items.map(i=>i.type))];
  $("#feedtitle").textContent=`Missed — ${brand?brand.name:selBrand}`;
  const shown=items.filter(i=>typeFilter==="all"||i.type===typeFilter);
  $("#feedcount").textContent=`${shown.length} unanswered`;
  const mk=(id,l)=>`<button class="ftype" data-t="${id}" aria-pressed="${typeFilter===id}">${l}</button>`;
  ftypes.innerHTML=mk("all","all")+types.map(t=>mk(t,t.replace(/_/g," "))).join("");
  ftypes.querySelectorAll(".ftype").forEach(b=>b.onclick=()=>{typeFilter=b.dataset.t;feed();});
  feedEl.innerHTML = shown.length? shown.map(i=>{
    const d=i.published_at?String(i.published_at).slice(0,10):"";
    return `<div class="card"><span class="stamp">no reply</span>
      <div class="top"><span class="badge b-${i.type}">${i.type.replace(/_/g,' ')}</span>
        <span class="urg ${i.urgency}" title="${i.urgency} urgency"></span>
        <span class="topic">${i.topic||""}</span></div>
      <div class="ctext">${esc(i.text||"").slice(0,320)}</div>
      <div class="meta"><span>♥ ${fmt(i.like_count||0)}</span><span>${d}</span>
        ${i.url?`<a href="${i.url}" target="_blank" rel="noopener">view on youtube →</a>`:""}</div></div>`;
  }).join("") : '<div class="empty">No comments of this type.</div>';
}
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function render(){stats();filterBar();league();feed();
  $("#context").innerHTML=`<span>Surface <b>YouTube (owned comments)</b></span><span>Window <b>365 days</b></span><span>Cohort <b>${withData.length} active / ${D.scorecard.length} tracked</b></span>`;
  $("#foot").textContent=`Data generated ${D.generated||"—"} · classification: gemini-2.5-flash · owned-comment response gap · a portfolio build`;
}
render();
</script>
</body>
</html>
